<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tegne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left column ── */
    #left {
      width: 35%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
      padding: 10px;
      gap: 8px;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #45475a; }
    button:active { background: #585b70; }

    #file-input { display: none; }

    #editor {
      flex: 1;
      background: #181825;
      color: #cdd6f4;
      border: 1px solid #313244;
      border-radius: 4px;
      padding: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
    #editor:focus { border-color: #89b4fa; }

    #error-panel {
      background: #2a1a1a;
      border: 1px solid #f38ba8;
      border-radius: 4px;
      padding: 8px 10px;
      color: #f38ba8;
      font-size: 11px;
      line-height: 1.6;
      max-height: 140px;
      overflow-y: auto;
      display: none;
    }
    #error-panel.visible { display: block; }

    /* ── Right column ── */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      overflow: hidden;
    }

    #right .toolbar { justify-content: flex-end; }

    #canvas-container {
      flex: 1;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="left">
      <div class="toolbar">
        <button id="btn-open">Open</button>
        <input type="file" id="file-input" accept=".sd,.id,.iff" />
        <button id="btn-save">Save</button>
        <button id="btn-render">Render</button>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="# Write your model here or open an .sd file&#10;&#10;stock Population&#10;cloud Births [source]&#10;..."></textarea>
      <div id="error-panel"></div>
    </div>

    <div id="right">
      <div class="toolbar">
        <button id="btn-zoom-in"  title="Zoom in">+</button>
        <button id="btn-zoom-out" title="Zoom out">−</button>
        <button id="btn-zoom-fit" title="Fit to window">⊡</button>
        <span id="zoom-label" style="align-self:center;font-size:11px;color:#585b70;min-width:36px;text-align:right;">100%</span>
        <button id="btn-export">Export SVG</button>
      </div>
      <div id="canvas-container">
        <svg id="canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
